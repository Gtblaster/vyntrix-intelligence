<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Vyntrix Intelligence</title>
    <meta name="description"
        content="Contact Vyntrix Intelligence to gain access to our advanced Deep Learning engine.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Orbitron:wght@500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="page-padding">
    <main>

        <!-- Navigation -->
        <nav id="navbar" class="glass-nav scrolled">
            <div class="logo">
                <a href="index.html">
                    <span class="v-mark">V</span>YNTRIX <span class="accent">INTELLIGENCE</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="solutions.html">Solutions</a></li>
                <li><a href="lab.html">R&D Lab</a></li>
                <li><a href="contact.html" class="active-link btn-glow">Access Engine</a></li>
            </ul>
        </nav>

        <!-- Contact Section -->
        <section id="contact" class="contact-section page-top">
            <div class="container text-center max-w-600 fade-in-up">
                <h2 class="section-title">CONNECT TO <span class="cyan-accent">VYNTRIX</span></h2>
                <p class="subtitle page-subtitle">Ready to effortlessly secure your business? Send us a transmission.
                </p>

                <div class="glass-card card-simple contact-form-container mt-4">
                    <form class="simple-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" class="input-large" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" class="input-large" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Transmission Details</label>
                            <textarea id="message" rows="4" class="input-large" required></textarea>
                        </div>
                        <button type="submit" class="btn-glow btn-large w-100">Establish Connection</button>
                    </form>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <div class="brand">
                <span class="v-mark">V</span>YNTRIX
            </div>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
